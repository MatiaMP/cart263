<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXTRACTION</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="world">
        <div id="sky"></div>
        <div id="sun"></div>
        <div id="ground"></div>
        <div id="character" style="left: 0px;"></div>
        <div id="life-container"></div>

        <div id="ui">
            <h1>Nature Observer</h1>
            <p>Resources Extracted: <span id="counter">0</span></p>
            <p id="status-msg">Environment: Stable</p>
        </div>

        <div id="tutorial">
            <h2>Tree Planting Simulator</h2>
            <p>Move around with Arrow Keys(Optional)</p>
            <p>Plant trees with LMB or Spacebar(Optional)</p>
        </div>
    </div>

    <script src = "js/main.js"></script>
</body>
</html>
